name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxss1 libnss3 libasound2-dev portaudio19-dev

      - name: Install dependencies (Linux - skip native module build)
        if: matrix.os == 'ubuntu-latest'
        run: npm ci --ignore-scripts

      - name: Install dependencies
        if: matrix.os != 'ubuntu-latest'
        run: npm ci

      - name: Build frontend
        run: npx tsc -p tsconfig.build.json --noEmit && npx vite build

      - name: Compile Electron main process
        run: npx esbuild electron/main.ts electron/preload.ts electron/input/keyboard.ts electron/input/mouse.ts electron/audio/microphone.ts electron/utils/settings.ts --platform=node --target=node18 --outbase=electron --outdir=dist-electron --format=cjs

      - name: Package for Windows
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --publish ${{ startsWith(github.ref, 'refs/tags/v') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package for macOS
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac --publish ${{ startsWith(github.ref, 'refs/tags/v') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package for Linux
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux --publish ${{ startsWith(github.ref, 'refs/tags/v') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.deb
            release/latest*.yml
          retention-days: 7
          if-no-files-found: ignore
